[workspace]
authors = ["LouisFaure <louis.faure75@gmail.com>"]
channels = ["conda-forge", "https://conda.anaconda.org/bioconda"]
name = "reproducibility"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
test-r = "Rscript test/chromvar_comparison_R.R"

[tasks.trace-gpu]
args = ["filename"]
cmd  = "python analysis/gpu_line_tracer.py {{filename}} --skip-snapatac2"

[dependencies]
python = "<3.14"
pip = "*"
r-base = "*"
"bioconductor-bsgenome.hsapiens.ucsc.hg19" = "*"
bioconductor-jaspar2016 = "*"
bioconductor-chromvar = { version = ">=1.30.1,<2", channel = "bioconda" }
r-archr = { version = ">=1.0.3,<2", channel = "bioconda" }

[pypi-dependencies]
gatac = { path = "/home/faurel1/data/tools/GATAC" ,editable = true, extras=["cuda12"] }
snapatac2 = { git = "https://github.com/scverse/SnapATAC2" }
jupyterlab = ">=4.5.3, <5"
ipywidgets = ">=8.1.8, <9"
intervaltree = "*"
MOODS-python = "*"
biopython = ">=1.73"
pytest = ">=9.0.2, <10"
gseapy = ">=1.1.3"
